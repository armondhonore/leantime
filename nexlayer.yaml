application:
  name: leantime
  pods:
  - name: app
    image: mirror.gcr.io/leantime/leantime:latest
    path: /
    servicePorts:
    - 80
    vars:
      LEAN_DB_HOST: mysql.pod
      LEAN_DB_USER: leantime
      LEAN_DB_PASSWORD: leantime
      LEAN_DB_DATABASE: leantime
      LEAN_EMAIL_RETURN: "armond@nexlayer.com"
      LEAN_SESSION_PASSWORD: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"
      LEAN_APP_URL: "https://relaxed-weasel-leantime.cloud.nexlayer.ai"
    volumes:
    - name: leantime-uploads
      mountPath: /var/www/html/userfiles
      size: 5Gi
  - name: mysql
    image: mirror.gcr.io/library/mysql:8
    servicePorts:
    - 3306
    vars:
      MYSQL_DATABASE: leantime
      MYSQL_USER: leantime
      MYSQL_PASSWORD: leantime
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
    - name: leantime-db
      mountPath: /var/lib/mysql
      size: 5Gi
